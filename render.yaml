# Render Blueprint — despliegue de la plataforma Defensa Alma.
# En Render: New → Blueprint → conecta este repositorio. Render lee este archivo.
# Nota: el disco persistente requiere un plan de pago (Starter o superior). En el plan
# gratuito la base de datos SQLite se reinicia en cada despliegue; para producción usa
# un plan con disco, o migra a Postgres/Supabase (ver README_DESPLIEGUE.md).
services:
  - type: web
    name: defensa-alma
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TZ
        value: America/Santiago
      - key: DATABASE_URL
        sync: false                # cadena de conexión de Supabase (Postgres). Recomendado.
      - key: PG_DIR
        value: /var/data/pgdata    # respaldo: Postgres local (PGlite) si no defines DATABASE_URL
      - key: DOCS_DIR
        value: /var/data/docs      # documentos generados (.docx)
      - key: SECURE_COOKIES
        value: "true"
      - key: SESSION_SECRET
        generateValue: true        # Render genera un secreto aleatorio
      - key: BASE_URL
        sync: false                # ej: https://defensa-alma.onrender.com o https://app.defensaalma.cl
      - key: ADMIN_EMAIL
        sync: false                # tu correo de acceso al panel
      - key: ADMIN_PASSWORD
        sync: false                # tu clave de acceso al panel
      - key: TBK_ENV
        value: integracion         # cambia a "produccion" cuando tengas Transbank
      - key: PAY_DEMO
        value: "false"
      - key: SLOT_DURATION_MIN
        value: "40"
      - key: SLOT_BREAK_MIN
        value: "30"
      - key: SLOT_START
        value: "15:00"
      - key: SLOT_END
        value: "19:00"
      # Opcionales (se agregan en el panel de Render cuando los tengas):
      # SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS, MAIL_FROM
      # TBK_COMMERCE_CODE, TBK_API_KEY (solo producción)
      # HOLIDAYS (feriados movibles del año, ej: 2026-04-03,2026-04-04)
