# Render Blueprint — despliegue de la plataforma Defensa Alma (plan gratuito para pruebas).
# En Render: New → Blueprint → conecta este repositorio. Render lee este archivo.
# Nota: en el plan gratuito el servicio se "duerme" tras inactividad y no hay disco
# persistente (los documentos generados son temporales). La base de datos va en Supabase
# (DATABASE_URL), así que los casos, pagos y citas SÍ se conservan.
services:
  - type: web
    name: defensa-alma
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: TZ
        value: America/Santiago
      - key: SECURE_COOKIES
        value: "true"
      - key: SESSION_SECRET
        generateValue: true        # Render genera un secreto aleatorio
      - key: DATABASE_URL
        sync: false                # cadena de conexión de Supabase (Session pooler)
      - key: BASE_URL
        sync: false                # ej: https://defensa-alma.onrender.com (se ajusta tras el primer deploy)
      - key: ADMIN_EMAIL
        sync: false                # tu correo de acceso al panel
      - key: ADMIN_PASSWORD
        sync: false                # tu clave de acceso al panel
      - key: TBK_ENV
        value: integracion         # cambia a "produccion" cuando cargues tus credenciales Webpay
      - key: PAY_DEMO
        value: "false"
      - key: SLOT_DURATION_MIN
        value: "40"
      - key: SLOT_BREAK_MIN
        value: "30"
      - key: SLOT_START
        value: "15:00"
      - key: SLOT_END
        value: "19:00"
      # Opcionales (se agregan en el panel de Render cuando los tengas):
      # SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS, MAIL_FROM
      # TBK_COMMERCE_CODE, TBK_API_KEY (solo producción)
      # HOLIDAYS (feriados movibles del año, ej: 2026-04-03,2026-04-04)
